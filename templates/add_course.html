<!-- templates/add_course.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة دورة جديدة</title>

    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 550px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-top: 15px;
            color: #444;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            background: #0078ff;
            color: #fff;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #005fcc;
        }

        .alert {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #0078ff;
            font-size: 16px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>إضافة دورة جديدة</h1>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="alert alert-{{ messages[0][0] }}">
                    {{ messages[0][1] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('add_course') }}" enctype="multipart/form-data">

            <label for="course_name">اسم الدورة:</label>
            <input type="text" id="course_name" name="course_name" required>

            <label for="course_description">الوصف:</label>
            <textarea id="course_description" name="course_description" rows="4" required></textarea>

            <label for="course_image">صورة الدورة:</label>
            <input type="file" id="course_image" name="course_image" accept="image/*" required>

            <label for="course_video">رابط الفيديو (اختياري):</label>
            <input type="url" id="course_video" name="course_video" placeholder="رابط الفيديو">

            <button type="submit">إضافة الدورة</button>
        </form>

        <a href="{{ url_for('admin_dashboard') }}">الرجوع إلى لوحة التحكم</a>
    </div>

</body>
</html>
